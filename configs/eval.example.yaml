benchmark:
  name: Bloom-Eval
  topics_file: data/topics/experimental_topics.csv
  summary_file: data/metadata/benchmark_summary.json

models:
  judge_model: gpt-5-mini
  judge_temperature: 0.0
  citation_model: gpt-4o
  embedding_model: nomic-ai/nomic-embed-text-v1

paths:
  prompts_dir: prompts
  results_dir: results
  generated_surveys_dir: generated/surveys

metrics:
  enabled:
    - EFid
    - HIRC
    - FCons
    - OTC
    - CF
    - TFSim
    - TBal
    - FMI
    - DSI
    - FAP
    - STS
    - SCons
    - SCS
    - CAA
    - FNov
    - ROQ

